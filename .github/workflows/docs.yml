name: Generate & Publish Doxygen Docs

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'src/include/**'
      - 'src/app/**'
      - 'src/CMakeLists.txt'
      - 'src/docs/doxygen/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-docs:
    name: Build & Publish Documentation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            graphviz \
            ca-certificates \
            wget \
            tar \
            ninja-build \
            clang
          clang++ --version
          g++ --version

      - name: Install Doxygen
        run: |
          DOXYGEN_VERSION="1.16.1"
          ARCHIVE="doxygen-${DOXYGEN_VERSION}.linux.bin.tar.gz"
          URL="https://www.doxygen.nl/files/${ARCHIVE}"

          # Prefer apt with exact version when Ubuntu repositories provide it.
          if apt-cache madison doxygen | awk '{print $3}' | grep -Eq '^1\.16\.1([.+~:-]|$)'; then
            sudo apt-get install -y "doxygen=${DOXYGEN_VERSION}*"
          elif wget -nv "${URL}" -O "${ARCHIVE}"; then
            tar -xzf "${ARCHIVE}"
            sudo install -m 0755 "doxygen-${DOXYGEN_VERSION}/bin/doxygen" /usr/local/bin/doxygen
          else
            echo "Exact ${DOXYGEN_VERSION} is unavailable; falling back to apt candidate."
            sudo apt-get install -y doxygen
          fi

          doxygen --version

      - name: Clean docs build directory
        run: rm -rf src/build

      - name: Configure CMake with Doxygen target
        working-directory: src
        run: |
          cmake --preset release \
            -DCONTUR2_BUILD_TUI=OFF \
            -DCONTUR2_BUILD_APP=OFF \
            -DCONTUR2_BUILD_TESTS=OFF

      - name: Generate Doxygen documentation
        working-directory: src
        run: cmake --build --preset release --target docs

      - name: List generated files
        working-directory: src
        run: |
          echo "Generated documentation structure:"
          ls -lah build/release/html/ | head -20
          echo "Total files:"
          find build/release/html -type f | wc -l

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload documentation to GitHub Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: 'src/build/release/html'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Print documentation URL
        run: |
          echo "Documentation published!"
          echo "View at: https://contur.yudashkin-dev.ru/"
