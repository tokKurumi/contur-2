name: CI

on:
  push:
    paths:
      - 'src/**'
      - '.clang-format'
      - '.clang-tidy'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'src/**'
      - '.clang-format'
      - '.clang-tidy'
      - '.github/workflows/ci.yml'

jobs:
  build-and-test:
    name: ${{ matrix.compiler }} (${{ matrix.flow }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: clang
            flow: release
            configure_preset: release
            build_preset: release
            test_preset: release
          - compiler: gcc
            flow: release
            configure_preset: gcc-release
            build_preset: gcc-release
            test_preset: gcc-release
          - compiler: clang
            flow: tsan-release
            configure_preset: tsan-release
            build_preset: tsan-release
            test_preset: tsan-release
          - compiler: gcc
            flow: tsan-release
            configure_preset: tsan-gcc-release
            build_preset: tsan-gcc-release
            test_preset: tsan-gcc-release

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build
          clang++ --version
          g++ --version

      - name: Configure
        run: cmake --preset ${{ matrix.configure_preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.build_preset }} 2>&1 | tee build_output.txt

      - name: Show warnings
        if: always()
        run: grep -i "warning:" build_output.txt || echo "No warnings found"

      - name: Run tests
        run: ctest --preset ${{ matrix.test_preset }} --output-on-failure
